<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Student CGPA Calculator</h1>
    <p class="lead">Calculate SGPA per semester and cumulative CGPA for engineering students.</p>
  </header>
  <main>
    <section id="calculator" class="card">
      <div class="controls">
        <button id="addSemesterBtn" class="btn">Add Semester</button>
        <button id="calculateBtn" class="btn primary">Calculate CGPA</button>
        <button id="resetBtn" class="btn">Reset</button>
      </div>

      <div class="result-lookup card small">
        <h3>Get Official Result</h3>
        <div style="display:flex;gap:.5rem;justify-content:center;align-items:center;">
          <input id="regInput" placeholder="Enter Register Number" style="padding:.5rem;border:1px solid #e5e7eb;border-radius:6px;width:220px;" />
          <button id="fetchResultBtn" class="btn">Fetch Result</button>
          <button id="openExternalBtn" class="btn">Open on KSRCEResults</button>
        </div>
        <p class="muted">The result will be fetched and shown below (server proxy used).</p>
      </div>

      <div id="semesters" class="semesters">
        <!-- Semesters will be added here -->
      </div>

      <div id="results" class="results" aria-live="polite">
        <p>No calculations yet.</p>
      </div>
      <div id="externalResult" style="margin-top:1rem;text-align:left;">
        <iframe id="resultFrame" style="width:100%;height:520px;border:1px solid #e5e7eb;border-radius:6px;display:none;"></iframe>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
